name: Sync Catalog
on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Codeberg
        run: |
          git remote add codeberg https://GetFoss:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/GetFOSS/GetFOSS-Catalog.git
          git push codeberg main --force

      - name: Sync to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/fossgroup/getfoss-catalog.git
          git push gitlab main --force
